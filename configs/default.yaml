# Единый конфиг. QUICK_TEST=true для быстрой проверки, что весь пайплайн бежит.
dataset: FashionMNIST        # FashionMNIST | MNIST
ckpt_dir: ./ckpt             # на Colab -> путь в Google Drive
res_dir: ./results
fig_dir: ./figures
widths: [16, 32, 64, 128, 256, 512, 1024]
k_seeds: 5                   # независимых пар сетей на ширину
epochs: 15
batch: 128
lr: 0.001
alpha_pts: 25
eval_n: 5000
two_layer_widths: [64, 128, 256, 512]   # для exp6 (обе скрытые = width)
snapshot_epochs: [1, 2, 3, 5, 8, 12, 15]  # для exp5 (LMC по ходу обучения)
quick_test: false
